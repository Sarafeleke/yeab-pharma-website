services:
  - type: web
    name: yeab-pharma
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py runserver 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SETTINGS_MODULE
        value: yeab_pharma.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: yeab-pharma-db
          property: connectionString

databases:
  - name: yeab-pharma-db
    plan: free
    databaseName: yeab_pharma
    user: yeab_user
